services:

  nginx:
    image: nginx:alpine
    container_name: taskmanager-nginx
    ports:
      - "80:80"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - flask1
      - flask2
    networks:
      - frontend
      - backend
    restart: unless-stopped

  flask1:
    build: .
    container_name: taskmanager-flask1
    environment:
      - SERVER_NAME=flask1
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=taskdb
      - POSTGRES_USER=taskuser
      - POSTGRES_PASSWORD=taskpass
      - REDIS_HOST=redis
      - SECRET_KEY=supersecret
    depends_on:
      - postgres
      - redis
    networks:
      - backend
    restart: unless-stopped

  flask2:
    build: .
    container_name: taskmanager-flask2
    environment:
      - SERVER_NAME=flask2
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=taskdb
      - POSTGRES_USER=taskuser
      - POSTGRES_PASSWORD=taskpass
      - REDIS_HOST=redis
      - SECRET_KEY=supersecret
    depends_on:
      - postgres
      - redis
    networks:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-postgres
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: taskmanager-redis
    volumes:
      - redisdata:/data
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
  backend:

volumes:
  pgdata:
  redisdata:
